# Karo: Chainlit app + PostgreSQL (pgvector). Usage: cp .env.example .env, fill secrets, then:
#   docker compose up --build
# Ingestion (after knowledge_chunks.txt exists):
#   docker compose run --rm app uv run python ingest.py
name: karo

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: karo
      POSTGRES_PASSWORD: karo
      POSTGRES_DB: qmrdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karo -d qmrdb"]
      interval: 3s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      # If DATABASE_URL / CHECKPOINT_DB_URL are set in .env (or your shell), they win.
      # Otherwise fall back to the in-cluster `postgres` service DNS name.
      # NOTE: when overriding via .env for Docker, do NOT use `localhost` — inside
      # the container localhost is the container itself. Use the host where the
      # DB is reachable from the container (e.g. `postgres`, a managed DB host, etc.).
      DATABASE_URL: ${DATABASE_URL:-postgresql://karo:karo@postgres:5432/qmrdb}
      CHECKPOINT_DB_URL: ${CHECKPOINT_DB_URL:-${DATABASE_URL:-postgresql://karo:karo@postgres:5432/qmrdb}}
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
